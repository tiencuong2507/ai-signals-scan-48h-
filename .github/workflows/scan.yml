name: AI Signals Scan 48H

on:
  schedule:
    # 22:00 UTC = 05:00 sáng giờ VN, mỗi ngày (fast mode)
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      scan_mode:
        description: 'Chế độ quét'
        required: false
        default: 'fast'
        type: choice
        options:
          - fast
          - deep

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCAN_MODE: ${{ github.event.inputs.scan_mode || 'fast' }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        run: python main.py

      - name: Commit newsletter
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "📡 Scan $(date +'%Y-%m-%d %H:%M UTC') [${{ github.event.inputs.scan_mode || 'fast' }}]" && git push
